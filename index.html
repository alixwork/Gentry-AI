<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Gentry AI - Ultimate Assistant</title>
    <style>
        /* Stiluri extra pentru Wishlist */
        .wishlist-container {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .product-card {
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #d4af37;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            text-align: left;
        }
        .product-card span { 
            color: #d4af37; 
            font-weight: bold; 
            display: block;
            margin-top: 5px;
        }
        .product-card a {
            color: #aaa;
            text-decoration: none;
            font-size: 11px;
            display: block;
            margin-top: 5px;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="phone-container" style="height: 850px;"> 
        <div class="logo">GENTRY</div>
        
        <div class="middle-section">
            <input type="text" id="userName" placeholder="Numele tău..." 
                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); color: white; padding: 10px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; text-align: center;">
            
            <input type="text" id="productLink" placeholder="Lipește link-ul aici..." 
                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: white; padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 15px; outline: none; text-align: center;">
            
            <h2 id="welcomeText" style="margin: 10px 0;">Bun venit,</h2>
        </div>

        <div id="chat-area" style="height: 100px; font-size: 14px;">
            <em>Gentry: Introdu un link de pe eMAG pentru a-l analiza și salva.</em>
        </div>

        <button class="action-btn" onclick="runAgent()">SCANEAZĂ ȘI SALVEAZĂ</button>

        <h4 style="color: #d4af37; margin-top: 20px; margin-bottom: 10px; font-size: 14px; letter-spacing: 2px;">WISHLIST DE LUX</h4>
        <div id="wishlist" class="wishlist-container">
            </div>
    </div>

    <script>
        // Actualizare nume în timp real
        document.getElementById('userName').addEventListener('input', function() {
            document.getElementById('welcomeText').innerText = "Bun venit, " + (this.value || "");
        });

        // Încărcăm produsele la start
        window.onload = displayWishlist;

        async function runAgent() {
            const productUrl = document.getElementById('productLink').value;
            const chat = document.getElementById('chat-area');
            const btn = document.querySelector('.action-btn');

            if (!productUrl) {
                chat.innerHTML = "Gentry: Te rog să adaugi un link valid.";
                return;
            }

            btn.innerText = "SE ANALIZEAZĂ...";
            btn.disabled = true;
            chat.innerHTML = "Gentry: Verific prețul pe serverele eMAG...";
            
            try {
                // ADRESA TA OFICIALA DE PE RENDER
                const response = await fetch('https://gentry-ai.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: productUrl })
                });
                
                const data = await response.json();
                
                if (data.status === "Success") {
                    saveToWishlist(data);
                    chat.innerHTML = `<strong>Gentry:</strong> Excelent! Am găsit produsul la prețul de ${data.price} lei.`;
                    document.getElementById('productLink').value = ""; // Curăță input-ul
                } else {
                    chat.innerHTML = "Gentry: Nu am putut extrage datele. Verifică link-ul.";
                }
            } catch (error) {
                chat.innerHTML = "Gentry: Serverul este ocupat. Te rog revino peste un moment.";
                console.error(error);
            } finally {
                btn.innerText = "SCANEAZĂ ȘI SALVEAZĂ";
                btn.disabled = false;
                displayWishlist();
            }
        }

        function saveToWishlist(product) {
            let list = JSON.parse(localStorage.getItem('gentry_list')) || [];
            // Salvăm și URL-ul pentru a putea da click pe el mai târziu
            const newEntry = {
                name: product.product_name,
                price: product.price,
                url: document.getElementById('productLink').value
            };
            list.unshift(newEntry);
            localStorage.setItem('gentry_list', JSON.stringify(list));
        }

        function displayWishlist() {
            const container = document.getElementById('wishlist');
            let list = JSON.parse(localStorage.getItem('gentry_list')) || [];
            
            if (list.length === 0) {
                container.innerHTML = "<div style='color: #666; font-size: 12px;'>Lista ta este goală.</div>";
                return;
            }

            container.innerHTML = list.map(item => `
                <div class="product-card">
                    <div><strong>${item.name}</strong></div>
                    <span>Preț Actual: ${item.price} lei</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
