<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Gentry AI - Concierge Digital</title>
    <style>
        .wishlist-container {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .product-card {
            background: rgba(255,255,255,0.07);
            border-left: 3px solid #d4af37;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            transition: 0.3s;
        }
        .product-card:hover { background: rgba(255,255,255,0.1); }
        .product-card strong { color: white; display: block; margin-bottom: 5px; font-size: 14px; }
        .product-card span { color: #d4af37; font-weight: bold; font-size: 16px; }
        
        /* BUTONUL DE PROFIT */
        .buy-btn {
            display: block;
            background: #d4af37;
            color: black !important;
            text-align: center;
            padding: 10px;
            margin-top: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="phone-container" style="height: 850px;"> 
        <div class="logo">GENTRY</div>
        
        <div class="middle-section">
            <input type="text" id="userName" placeholder="Numele tău..." 
                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); color: white; padding: 10px; border-radius: 12px; width: 100%; margin-bottom: 10px; outline: none; text-align: center;">
            
            <input type="text" id="productLink" placeholder="Lipește link-ul produsului..." 
                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: white; padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 15px; outline: none; text-align: center;">
            
            <h2 id="welcomeText" style="margin: 10px 0;">Bun venit,</h2>
        </div>

        <div id="chat-area" style="height: 100px; font-size: 14px; color: #ccc; padding: 0 10px;">
            <em>Gentry: Introdu un link pentru a începe analiza de piață.</em>
        </div>

        <button class="action-btn" onclick="runAgent()">SCANEAZĂ PRODUSUL</button>

        <h4 style="color: #d4af37; margin-top: 25px; margin-bottom: 15px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase;">Portofoliu Produse</h4>
        <div id="wishlist" class="wishlist-container"></div>
    </div>

    <script>
        // Salut personalizat
        document.getElementById('userName').addEventListener('input', function() {
            document.getElementById('welcomeText').innerText = "Bun venit, " + (this.value || "");
        });

        window.onload = displayWishlist;

        async function runAgent() {
            const productUrl = document.getElementById('productLink').value;
            const chat = document.getElementById('chat-area');
            const btn = document.querySelector('.action-btn');

            if (!productUrl) {
                chat.innerHTML = "Gentry: Te rog să introduci un link.";
                return;
            }

            btn.innerText = "SE ANALIZEAZĂ...";
            btn.disabled = true;
            chat.innerHTML = "Gentry: Verific disponibilitatea și prețul actual...";
            
            try {
                // Link-ul tău de pe Render
                const response = await fetch('https://gentry-ai.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: productUrl })
                });
                
                const data = await response.json();
                
                if (data.status === "Success") {
                    saveToWishlist(data, productUrl);
                    chat.innerHTML = `<strong>Gentry:</strong> Analiză completă. Produsul este disponibil la <strong>${data.price} lei</strong>. L-am salvat în portofoliu.`;
                    document.getElementById('productLink').value = "";
                } else {
                    chat.innerHTML = "Gentry: Nu am putut procesa acest link. Încearcă un link de eMAG.";
                }
            } catch (error) {
                chat.innerHTML = "Gentry: Conexiunea cu serverul a fost întreruptă. Încearcă din nou.";
            } finally {
                btn.innerText = "SCANEAZĂ PRODUSUL";
                btn.disabled = false;
                displayWishlist();
            }
        }

        function saveToWishlist(product, originalUrl) {
            let list = JSON.parse(localStorage.getItem('gentry_list')) || [];
            const newEntry = {
                name: product.product_name,
                price: product.price,
                url: originalUrl,
                date: new Date().toLocaleDateString()
            };
            list.unshift(newEntry);
            localStorage.setItem('gentry_list', JSON.stringify(list));
        }

        function displayWishlist() {
            const container = document.getElementById('wishlist');
            let list = JSON.parse(localStorage.getItem('gentry_list')) || [];
            
            if (list.length === 0) {
                container.innerHTML = "<div style='color: #666; font-size: 12px; text-align: center;'>Nu ai produse scanate încă.</div>";
                return;
            }

            container.innerHTML = list.map(item => `
                <div class="product-card">
                    <strong>${item.name}</strong>
                    <span>${item.price} lei</span>
                    <a href="${item.url}" target="_blank" class="buy-btn">
                        Cumpără prin Gentry
                    </a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
