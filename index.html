<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <title>Gentry AI - Concierge Digital</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 360px;
            height: 780px;
            background: #111;
            border: 8px solid #222;
            border-radius: 40px;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 5px;
            color: #d4af37;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            padding: 14px;
            border-radius: 15px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 20px;
            margin: 10px 0;
        }

        #chat-area {
            min-height: 70px;
            font-size: 13px;
            color: #bbb;
            text-align: center;
            padding: 10px;
            line-height: 1.4;
        }

        .action-btn {
            background: linear-gradient(135deg, #d4af37 0%, #f2d479 100%);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .wishlist-container {
            margin-top: 25px;
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .product-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            color: #666;
            cursor: pointer;
            font-size: 18px;
        }
