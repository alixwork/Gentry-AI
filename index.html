<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Gentry AI - Concierge Digital</title>
    <style>
        .wishlist-container {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: #d4af37 transparent;
        }
        .product-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: left;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .product-card strong { color: #fff; display: block; margin-bottom: 5px; font-size: 15px; line-height: 1.3; }
        .product-card .price-tag { color: #d4af37; font-weight: bold; font-size: 18px; display: block; margin: 8px 0; }
        
        .buy-btn {
            display: block;
            background: linear-gradient(135deg, #d4af37 0%, #f2d479 100%);
            color: #000 !important;
            text-align: center;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #d4af37;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="phone-container" style="height: 850px;"> 
        <div class="logo">GENTRY</div>
        
        <div class="middle-section">
            <input type="text" id="userName" placeholder="Numele tău..." 
                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2); color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 12px; outline: none; text-align: center; font-family: 'Inter', sans-serif;">
            
            <input type="text" id="productLink" placeholder="Lipește link-ul eMAG aici..." 
                   style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: white; padding: 14px; border-radius: 15px; width: 100%; margin-bottom: 20px; outline: none; text-align: center;">
            
            <h2 id="welcomeText" style="margin: 10px 0; font-family: 'Playfair Display', serif;">Bun venit,</h2>
        </div>

        <div id="chat-area" style="min-height: 80px; font-size: 14px; color: #ddd; padding: 10px 20px; line-height: 1.5;">
            <em>Gentry: Sunt pregătit să îți analizez selecțiile de lux. Introdu un link.</em>
        </div>

        <button class="action-btn" id="mainBtn" onclick="runAgent()">SCANEAZĂ PRODUSUL</button>

        <h4 style="color: #d4af37; margin-top: 30px; margin-bottom: 15px; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.8;">Portofoliu Produse</h4>
        <div id="wishlist" class="wishlist-container"></div>
    </div>

    <script>
        document.getElementById('userName').addEventListener('input', function() {
            document.getElementById('welcomeText').innerText = "Bun venit, " + (this.value || "");
        });

        window.onload = displayWishlist;

        async function runAgent() {
            const productUrl = document.getElementById('productLink').value;
            const chat = document.getElementById('chat-area');
            const btn = document.getElementById('mainBtn');

            if (!productUrl) {
                chat.innerHTML = "Gentry: Te rog să îmi oferi un link de produs.";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> ANALIZĂ ÎN CURS...';
            chat.innerHTML = "Gentry: Verific bazele de date eMAG pentru cel mai bun preț...";
            
            try {
                const response = await fetch('https://gentry-ai.onrender.com/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: productUrl })
                });
                
                const data = await response.json();
                
                if (data.status === "Success") {
                    // Curățăm prețul în caz că vine cu text extra
                    let cleanPrice = data.price.toString().replace(/[^0-9,.]/g, '');
                    saveToWishlist(data.product_name, cleanPrice, productUrl);
                    
                    chat.innerHTML = `<strong>Gentry:</strong> Excelent! Am găsit produsul la prețul de <strong>${cleanPrice} lei</strong>. L-am adăugat în portofoliul tău.`;
                    document.getElementById('productLink').value = "";
                } else {
                    chat.innerHTML = "Gentry: Link-ul nu pare valid sau produsul nu este în stoc.";
                }
            } catch (error) {
                chat.innerHTML = "Gentry: Serverul este sub asediu. Te rog reîncearcă în câteva secunde.";
            } finally {
                btn.disabled = false;
                btn.innerText = "SCANEAZĂ PRODUSUL";
                displayWishlist();
            }
        }

        function saveToWishlist(name, price, url) {
            let list = JSON.parse(localStorage.getItem('gentry_list')) || [];
            list.unshift({ name, price, url });
            localStorage.setItem('gentry_list', JSON.stringify(list));
        }

        function displayWishlist() {
            const container = document.getElementById('wishlist');
            let list = JSON.parse(localStorage.getItem('gentry_list')) || [];
            
            if (list.length === 0) {
                container.innerHTML = "<div style='color: #666; font-size: 12px; text-align: center; margin-top: 20px;'>Portofoliul tău este gol momentan.</div>";
                return;
            }

            container.innerHTML = list.map(item => `
                <div class="product-card">
                    <strong>${item.name}</strong>
                    <span class="price-tag">${item.price} lei</span>
                    <a href="${item.url}" target="_blank" class="buy-btn">Cumpără prin Gentry</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
